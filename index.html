<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fresno Auctions 🏷️</title>
<style>
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface2: #263347;
    --border: #334155;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --accent: #f59e0b;
    --steal: #10b981;
    --red: #ef4444;
    --radius: 10px;
    --font: 'Inter', system-ui, -apple-system, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }

  /* ── HEADER ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    position: sticky; top: 0; z-index: 100;
  }
  .header-inner {
    max-width: 1300px; margin: 0 auto;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  .logo { font-size: 22px; font-weight: 900; color: var(--accent); letter-spacing: -0.02em; white-space: nowrap; }
  .logo span { color: var(--muted); font-weight: 400; font-size: 13px; margin-left: 8px; }
  .last-updated { font-size: 12px; color: var(--muted); margin-left: auto; white-space: nowrap; }
  .refresh-btn {
    background: var(--accent); color: #1e293b; border: none;
    padding: 8px 16px; border-radius: 7px; font-weight: 700; font-size: 13px;
    cursor: pointer; transition: opacity 0.15s;
  }
  .refresh-btn:hover { opacity: 0.85; }

  /* ── SEARCH + FILTERS ── */
  .controls {
    max-width: 1300px; margin: 20px auto; padding: 0 20px;
    display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
  }
  .search-wrap { position: relative; flex: 1 1 260px; }
  .search-wrap input {
    width: 100%; padding: 10px 14px 10px 38px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 14px;
    font-family: var(--font); outline: none;
    transition: border-color 0.15s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 16px; }
  select {
    padding: 10px 12px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 13px; font-family: var(--font);
    cursor: pointer; outline: none;
  }
  select:focus { border-color: var(--accent); }
  .toggle-btn {
    padding: 10px 14px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; color: var(--muted); font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .toggle-btn.active { background: var(--accent); color: #1e293b; border-color: var(--accent); }
  .stats-bar {
    max-width: 1300px; margin: 0 auto 16px; padding: 0 20px;
    display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
  }
  .stat-chip {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 5px 12px;
    font-size: 12px; color: var(--muted);
  }
  .stat-chip strong { color: var(--text); }
  .steal-chip {
    background: rgba(16,185,129,0.15); border: 1px solid var(--steal);
    border-radius: 6px; padding: 5px 12px;
    font-size: 12px; color: var(--steal); font-weight: 700; cursor: pointer;
  }
  .steal-chip.active { background: var(--steal); color: #fff; }

  /* ── TABS ── */
  .tabs-wrap { max-width: 1300px; margin: 0 auto 4px; padding: 0 20px; }
  .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); overflow-x: auto; }
  .tab {
    padding: 10px 18px; font-size: 13px; font-weight: 600; cursor: pointer;
    border-bottom: 3px solid transparent; color: var(--muted);
    white-space: nowrap; transition: all 0.15s; background: none; border-top: none; border-left: none; border-right: none;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab .count {
    display: inline-block; background: var(--surface2); color: var(--muted);
    border-radius: 10px; padding: 1px 7px; font-size: 11px; margin-left: 5px;
  }
  .tab.active .count { background: rgba(245,158,11,0.15); color: var(--accent); }

  /* ── LAYOUT TOGGLE ── */
  .view-controls {
    max-width: 1300px; margin: 12px auto 0; padding: 0 20px;
    display: flex; justify-content: flex-end; gap: 6px;
  }
  .view-btn {
    padding: 6px 12px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; color: var(--muted); font-size: 18px; cursor: pointer;
  }
  .view-btn.active { border-color: var(--accent); color: var(--accent); }

  /* ── GRID ── */
  .main { max-width: 1300px; margin: 0 auto; padding: 16px 20px 40px; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 14px; }
  .list { display: flex; flex-direction: column; gap: 8px; }

  /* ── LOT CARD (GRID) ── */
  .lot-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden; cursor: pointer;
    transition: transform 0.12s, box-shadow 0.12s;
    text-decoration: none; display: flex; flex-direction: column;
  }
  .lot-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); border-color: #4b6080; }
  .lot-card.steal { border-color: var(--steal); box-shadow: 0 0 0 1px var(--steal); }

  .card-img {
    width: 100%; height: 160px; object-fit: cover; background: var(--surface2);
    display: block;
  }
  .card-img-placeholder {
    width: 100%; height: 110px; background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    font-size: 32px; color: var(--border);
  }
  .card-body { padding: 12px; flex: 1; display: flex; flex-direction: column; gap: 7px; }
  .card-source {
    font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; display: flex; align-items: center; gap: 5px;
  }
  .source-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
  .card-title { font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.35; }
  .card-raw { font-size: 11px; color: var(--muted); line-height: 1.3; margin-top: -3px; }
  .card-meta { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; margin-top: 2px; }
  .badge {
    font-size: 11px; font-weight: 600; padding: 2px 7px;
    border-radius: 4px; letter-spacing: 0.02em;
  }
  .badge-bid { background: rgba(245,158,11,0.15); color: var(--accent); }
  .badge-nobid { background: rgba(16,185,129,0.15); color: var(--steal); }
  .badge-steal { background: var(--steal); color: #fff; }
  .badge-category { background: var(--surface2); color: var(--muted); }
  .card-closing { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .card-pickup { font-size: 11px; color: var(--muted); }
  .card-footer {
    margin-top: auto; padding-top: 8px; border-top: 1px solid var(--border);
    font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 4px;
  }

  /* ── LOT ROW (LIST) ── */
  .lot-row {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; display: flex; align-items: center; gap: 14px;
    padding: 10px 14px; cursor: pointer; text-decoration: none;
    transition: background 0.12s; color: var(--text);
  }
  .lot-row:hover { background: var(--surface2); }
  .lot-row.steal { border-color: var(--steal); }
  .row-img {
    width: 60px; height: 60px; object-fit: cover;
    border-radius: 6px; background: var(--surface2); flex-shrink: 0;
  }
  .row-img-placeholder {
    width: 60px; height: 60px; border-radius: 6px;
    background: var(--surface2); display: flex; align-items: center;
    justify-content: center; font-size: 20px; flex-shrink: 0;
  }
  .row-body { flex: 1; min-width: 0; }
  .row-title { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .row-raw { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .row-meta { display: flex; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
  .row-right { text-align: right; flex-shrink: 0; }
  .row-bid { font-size: 16px; font-weight: 800; color: var(--accent); }
  .row-closing { font-size: 11px; color: var(--muted); }
  .row-source { font-size: 10px; color: var(--muted); font-weight: 600; margin-top: 3px; }

  /* ── EMPTY STATE ── */
  .empty {
    text-align: center; padding: 80px 20px; color: var(--muted);
  }
  .empty-icon { font-size: 52px; margin-bottom: 14px; }
  .empty h2 { font-size: 18px; color: var(--text); margin-bottom: 8px; }
  .empty p { font-size: 14px; line-height: 1.6; }
  .empty a { color: var(--accent); }

  /* ── LOADING ── */
  .loading { text-align: center; padding: 60px; color: var(--muted); font-size: 14px; }
  .spinner { font-size: 32px; animation: spin 1s linear infinite; display: block; margin-bottom: 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── SECTION HEADER ── */
  .section-header {
    display: flex; align-items: center; gap: 10px;
    margin: 20px 0 12px; font-size: 13px; font-weight: 700;
    color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em;
  }
  .section-header::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .section-dot { width: 10px; height: 10px; border-radius: 50%; }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .header-inner { gap: 10px; }
    .logo span { display: none; }
    .controls { gap: 8px; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
    .card-img { height: 120px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">🏷️ Fresno Auctions <span>Fresno / Madera area · HiBid</span></div>
    <div class="last-updated" id="lastUpdated">Loading...</div>
    <button class="refresh-btn" onclick="loadData()">↺ Refresh</button>
  </div>
</header>

<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Search anything — nailer, couch, TV, drill..." oninput="applyFilters()">
  </div>
  <select id="categoryFilter" onchange="applyFilters()">
    <option value="">All Categories</option>
    <option>Tools & Hardware</option>
    <option>Electronics</option>
    <option>Furniture</option>
    <option>Appliances</option>
    <option>Home Goods & Decor</option>
    <option>Clothing & Accessories</option>
    <option>Toys & Games</option>
    <option>Jewelry & Watches</option>
    <option>Outdoor & Garden</option>
    <option>Sports & Fitness</option>
    <option>Automotive</option>
    <option>Books & Media</option>
    <option>Art & Collectibles</option>
    <option>Other</option>
  </select>
  <select id="sortFilter" onchange="applyFilters()">
    <option value="closing">Closing Soonest</option>
    <option value="newest">Newest Listings</option>
    <option value="bid_asc">Lowest Bid</option>
    <option value="bid_desc">Highest Bid</option>
  </select>
</div>

<div class="stats-bar">
  <div class="stat-chip" id="statTotal"><strong>—</strong> lots</div>
  <div class="stat-chip" id="statShowing"><strong>—</strong> showing</div>
  <div class="steal-chip" id="stealToggle" onclick="toggleSteals()">🔥 <span id="stealCount">—</span> Steals</div>
</div>

<div class="tabs-wrap">
  <div class="tabs" id="tabsContainer"></div>
</div>

<div class="view-controls">
  <button class="view-btn active" id="btnGrid" onclick="setView('grid')" title="Grid view">▦</button>
  <button class="view-btn" id="btnList" onclick="setView('list')" title="List view">☰</button>
</div>

<div class="main" id="mainContent">
  <div class="loading"><span class="spinner">⏳</span>Loading auction data...</div>
</div>

<script>
let allLots = [];
let sources = [];
let activeTab = 'all';
let viewMode = 'grid';
let showStealsOnly = false;
let lastData = null;

// ── DATA LOADING ──────────────────────────────────────────────────────────────

async function loadData() {
  try {
    const res = await fetch(`data.json?t=${Date.now()}`);
    if (!res.ok) throw new Error('data.json not found');
    const data = await res.json();
    lastData = data;
    allLots = data.lots || [];
    sources = data.sources || [];

    document.getElementById('lastUpdated').textContent = `Updated: ${data.lastUpdatedLocal || 'Unknown'}`;
    document.getElementById('statTotal').innerHTML = `<strong>${allLots.length}</strong> lots`;

    const steals = allLots.filter(l => l.isSteal);
    document.getElementById('stealCount').textContent = steals.length;

    buildTabs();
    applyFilters();
  } catch (e) {
    document.getElementById('mainContent').innerHTML = `
      <div class="empty">
        <div class="empty-icon">📭</div>
        <h2>No auction data yet</h2>
        <p>Run the scraper on your Windows PC to populate this dashboard.<br>
        Once it pushes <code>data.json</code> to GitHub, lots will appear here.<br><br>
        <a href="https://hibid.com/california/auctions" target="_blank">Browse HiBid directly →</a></p>
      </div>`;
    document.getElementById('lastUpdated').textContent = 'No data';
  }
}

// ── TABS ──────────────────────────────────────────────────────────────────────

function buildTabs() {
  const container = document.getElementById('tabsContainer');
  const tabs = [{ id: 'all', name: 'All Auctions', color: '#f59e0b' }, ...sources];

  container.innerHTML = tabs.map(s => {
    const count = s.id === 'all'
      ? allLots.length
      : allLots.filter(l => l.sourceId === s.id).length;
    return `<button class="tab ${s.id === activeTab ? 'active' : ''}"
      onclick="setTab('${s.id}')" style="${s.id === activeTab ? `border-bottom-color:${s.color};color:${s.color}` : ''}">
      ${s.name} <span class="count">${count}</span>
    </button>`;
  }).join('');
}

function setTab(id) {
  activeTab = id;
  buildTabs();
  applyFilters();
}

// ── FILTERS ───────────────────────────────────────────────────────────────────

function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const cat = document.getElementById('categoryFilter').value;
  const sort = document.getElementById('sortFilter').value;

  let filtered = [...allLots];

  // Tab filter
  if (activeTab !== 'all') {
    filtered = filtered.filter(l => l.sourceId === activeTab);
  }

  // Steal filter
  if (showStealsOnly) {
    filtered = filtered.filter(l => l.isSteal);
  }

  // Category filter
  if (cat) {
    filtered = filtered.filter(l => l.category === cat);
  }

  // Smart search — searches normalized title, raw title, tags, category
  if (q) {
    filtered = filtered.filter(l => {
      const haystack = [
        l.normalizedTitle,
        l.rawTitle,
        l.title,
        l.description,
        l.category,
        ...(l.tags || [])
      ].join(' ').toLowerCase();
      return q.split(' ').every(word => haystack.includes(word));
    });
  }

  // Sort
  filtered.sort((a, b) => {
    if (sort === 'bid_asc') return (a.currentBid || 0) - (b.currentBid || 0);
    if (sort === 'bid_desc') return (b.currentBid || 0) - (a.currentBid || 0);
    if (sort === 'newest') return new Date(b.scrapedAt || 0) - new Date(a.scrapedAt || 0);
    if (sort === 'closing') {
      const ta = a.closingTime ? new Date(a.closingTime) : new Date('9999');
      const tb = b.closingTime ? new Date(b.closingTime) : new Date('9999');
      if (isNaN(ta)) return 1;
      if (isNaN(tb)) return -1;
      return ta - tb;
    }
    return 0;
  });

  document.getElementById('statShowing').innerHTML = `<strong>${filtered.length}</strong> showing`;
  renderLots(filtered);
}

function toggleSteals() {
  showStealsOnly = !showStealsOnly;
  document.getElementById('stealToggle').classList.toggle('active', showStealsOnly);
  applyFilters();
}

// ── RENDER ────────────────────────────────────────────────────────────────────

function setView(mode) {
  viewMode = mode;
  document.getElementById('btnGrid').classList.toggle('active', mode === 'grid');
  document.getElementById('btnList').classList.toggle('active', mode === 'list');
  applyFilters();
}

function renderLots(lots) {
  const main = document.getElementById('mainContent');

  if (!lots.length) {
    main.innerHTML = `<div class="empty">
      <div class="empty-icon">🔍</div>
      <h2>No lots match</h2>
      <p>Try different search terms or clear your filters.</p>
    </div>`;
    return;
  }

  if (viewMode === 'grid') {
    main.innerHTML = `<div class="grid">${lots.map(renderCard).join('')}</div>`;
  } else {
    // Group by source in list view
    if (activeTab === 'all') {
      const grouped = {};
      lots.forEach(l => {
        const key = l.sourceName || 'Unknown';
        if (!grouped[key]) grouped[key] = { lots: [], color: l.sourceColor };
        grouped[key].lots.push(l);
      });
      let html = '';
      for (const [name, group] of Object.entries(grouped)) {
        html += `<div class="section-header"><span class="section-dot" style="background:${group.color}"></span>${name} (${group.lots.length})</div>`;
        html += `<div class="list">${group.lots.map(renderRow).join('')}</div>`;
      }
      main.innerHTML = html;
    } else {
      main.innerHTML = `<div class="list">${lots.map(renderRow).join('')}</div>`;
    }
  }
}

function bidBadge(lot) {
  if (lot.isSteal) return `<span class="badge badge-steal">🔥 STEAL</span>`;
  if (lot.currentBid === 0) return `<span class="badge badge-nobid">No bids</span>`;
  return `<span class="badge badge-bid">$${lot.currentBid.toFixed(2)}</span>`;
}

function renderCard(lot) {
  const img = lot.imageUrl
    ? `<img class="card-img" src="${escHtml(lot.imageUrl)}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
    : '';
  const placeholder = `<div class="card-img-placeholder" style="${lot.imageUrl ? 'display:none' : ''}">📦</div>`;
  const showRaw = lot.normalizedTitle && lot.normalizedTitle !== lot.rawTitle && lot.rawTitle;

  return `<a class="lot-card ${lot.isSteal ? 'steal' : ''}" href="${escHtml(lot.url || '#')}" target="_blank" rel="noopener">
    ${img}${placeholder}
    <div class="card-body">
      <div class="card-source">
        <span class="source-dot" style="background:${lot.sourceColor || '#888'}"></span>
        <span style="color:${lot.sourceColor || '#888'}">${escHtml(lot.sourceName || '')}</span>
        ${lot.lotNumber ? `<span style="color:var(--border);margin-left:auto">Lot #${escHtml(lot.lotNumber)}</span>` : ''}
      </div>
      <div class="card-title">${escHtml(lot.normalizedTitle || lot.rawTitle || lot.title || 'Unknown Item')}</div>
      ${showRaw ? `<div class="card-raw">${escHtml(lot.rawTitle)}</div>` : ''}
      <div class="card-meta">
        ${bidBadge(lot)}
        ${lot.category ? `<span class="badge badge-category">${escHtml(lot.category)}</span>` : ''}
      </div>
      ${lot.closingTime ? `<div class="card-closing">🕐 ${escHtml(lot.closingTime)}</div>` : ''}
      ${lot.pickup ? `<div class="card-pickup">📍 Pickup: ${escHtml(lot.pickup)}</div>` : ''}
      <div class="card-footer">↗ View &amp; Bid on HiBid</div>
    </div>
  </a>`;
}

function renderRow(lot) {
  const img = lot.imageUrl
    ? `<img class="row-img" src="${escHtml(lot.imageUrl)}" alt="" loading="lazy" onerror="this.outerHTML='<div class=\\'row-img-placeholder\\'>📦</div>'">`
    : `<div class="row-img-placeholder">📦</div>`;
  const showRaw = lot.normalizedTitle && lot.normalizedTitle !== lot.rawTitle && lot.rawTitle;

  return `<a class="lot-row ${lot.isSteal ? 'steal' : ''}" href="${escHtml(lot.url || '#')}" target="_blank" rel="noopener">
    ${img}
    <div class="row-body">
      <div class="row-title">${escHtml(lot.normalizedTitle || lot.rawTitle || lot.title || 'Unknown Item')}</div>
      ${showRaw ? `<div class="row-raw">${escHtml(lot.rawTitle)}</div>` : ''}
      <div class="row-meta">
        ${bidBadge(lot)}
        ${lot.category ? `<span class="badge badge-category">${escHtml(lot.category)}</span>` : ''}
      </div>
    </div>
    <div class="row-right">
      <div class="row-bid">${lot.currentBid > 0 ? '$' + lot.currentBid.toFixed(2) : '—'}</div>
      ${lot.closingTime ? `<div class="row-closing">${escHtml(lot.closingTime)}</div>` : ''}
      <div class="row-source" style="color:${lot.sourceColor || '#888'}">${escHtml(lot.sourceName || '')}</div>
    </div>
  </a>`;
}

function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── INIT ──────────────────────────────────────────────────────────────────────
loadData();
// Auto-refresh every 30 minutes
setInterval(loadData, 30 * 60 * 1000);
</script>
</body>
</html>
